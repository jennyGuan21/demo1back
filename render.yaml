services:
  - type: web
    name: demoback
    env: java
    region: oregon
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/demoback-0.0.1-SNAPSHOT.jar
    envVars:
      - key: JAVA_VERSION
        value: 11
      - key: SPRING_PROFILES_ACTIVE
        value: production
